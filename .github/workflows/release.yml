name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release ZIP
        run: |
          mkdir -p staging/syncthing.koplugin/bin
          cp main.lua _meta.lua cacert.pem LICENSE README.md staging/syncthing.koplugin/
          cp bin/.gitkeep staging/syncthing.koplugin/bin/
          cd staging
          zip -r ../syncthing.koplugin.zip syncthing.koplugin/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: syncthing.koplugin.zip
          generate_release_notes: true
